<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Escolar</title>

    <!-- Tailwind CSS (via CDN per a desenvolupament ràpid) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Estils personalitzats -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Import Maps per a mòduls ES -->
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
          "@google/genai": "https://esm.sh/@google/genai@^1.10.0",
          "chess.js": "https://esm.sh/chess.js@1.0.0-beta.8"
        }
      }
    </script>
  </head>
  <body
    class="bg-gradient-to-br from-blue-100 via-blue-50 to-indigo-100 min-h-screen font-sans"
  >
    <!-- Contenidor principal de l'aplicació -->
    <div
      id="app"
      class="flex items-center justify-center min-h-screen p-4 transition-all duration-500"
    >
      <!-- El contingut s'injectarà aquí via JavaScript -->
      <div class="flex flex-col items-center">
        <div
          class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"
        ></div>
        <p class="text-gray-600 font-medium">Carregant sistema...</p>
      </div>
    </div>

    <!-- Lògica de l'aplicació -->
    <script type="module" src="script.js"></script>
  </body>
</html>
