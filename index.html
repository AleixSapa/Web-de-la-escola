<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Escolar</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(0, 0, 0, 0.2);
        border-radius: 20px;
      }

      .message-bubble {
        max-width: 75%;
        padding: 8px 12px;
        border-radius: 8px;
        position: relative;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        word-wrap: break-word;
      }
      .message-sent {
        background-color: #dcf8c6;
        margin-left: auto;
        border-top-right-radius: 0;
      }
      .message-received {
        background-color: #ffffff;
        margin-right: auto;
        border-top-left-radius: 0;
      }
      #chat-messages-container {
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%239C92AC' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-blue-100 via-blue-50 to-indigo-100 min-h-screen text-gray-800"
  >
    <div id="app" class="w-full h-screen flex flex-col">
      <div
        id="loading-screen"
        class="flex flex-col items-center justify-center h-full"
      >
        <div
          class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"
        ></div>
        <p class="text-gray-600 font-medium">Carregant dades...</p>
      </div>
    </div>

    <script type="module">
      // --- CONFIGURACIÓ ---
      const SUPABASE_URL = "https://hocwnqqdyyinjrtczhdw.supabase.co";
      const SUPABASE_KEY = "sb_publishable_X_TrrWex0GfBLIzbKFp1Cg_Xa97mziS";
      const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // --- ESTAT GLOBAL ---
      const state = {
        currentUser: null,
        view: "login", // login, dashboard, chat
        dashboardView: "menu", // menu, grades, homework
        users: [],
        conversations: [],
        currentChatId: null,
        students: [],
        myGrades: [],
        myHomework: [],
        isLoadingData: false,
      };

      // --- ICONES SVG ---
      const Icons = {
        User: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.108a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.642Z" /></svg>`,
        Lock: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 0 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H4.5a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" /></svg>`,
        Chat: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193l-3.722.537a59.014 59.014 0 0 1-5.032 0l-3.722-.537C3.347 17.1 2.5 16.136 2.5 15v-4.286c0-.97.616-1.813 1.5-2.097L6.6 6.49M20.25 8.511l-6.442-3.22a44.947 44.947 0 0 0-5.616 0L1.75 6.49m9.191 1.063c.22.046.45.082.68.118l3.45-1.725a2.25 2.25 0 0 1 2.158 1.162l.516 1.032a2.25 2.25 0 0 1-1.162 2.158l-3.45 1.725a1.125 1.125 0 0 1-1.229-.586l-.516-1.032a1.125 1.125 0 0 1 .586-1.229Zm-2.836.216a1.125 1.125 0 0 1-.586 1.229l-3.45 1.725a2.25 2.25 0 0 1-2.158-1.162l-.516-1.032a2.25 2.25 0 0 1 1.162-2.158l3.45-1.725c.22.046.45.082.68.118a1.125 1.125 0 0 1 .586 1.229Z" /></svg>`,
        Logout: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H5.25" /></svg>`,
        Academic: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 0 0-.491 6.347A48.627 48.627 0 0 1 12 20.904a48.627 48.627 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.57 50.57 0 0 0-2.658-.813A59.905 59.905 0 0 1 12 3.493a59.902 59.902 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" /></svg>`,
        Send: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>`,
        Back: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" /></svg>`,
        Book: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg>`,
        Clock: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`,
        Check: `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" /></svg>`,
      };

      // --- FUNCIONS PRINCIPALS ---

      async function initApp() {
        try {
          // Carregar usuaris
          const { data: usersData } = await supabase.from("users").select("*");
          if (usersData) state.users = usersData;

          // Carregar converses
          const { data: convData } = await supabase
            .from("conversations")
            .select("*");
          if (convData) state.conversations = convData;

          renderApp();
        } catch (err) {
          console.error("Error inicialitzant:", err);
          document.getElementById(
            "app"
          ).innerHTML = `<p class="text-red-500 text-center p-10">Error carregant l'aplicació.</p>`;
        }
      }

      function renderApp() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        switch (state.view) {
          case "login":
            renderLogin(app);
            break;
          case "dashboard":
            renderDashboard(app);
            break;
          case "chat":
            renderChat(app);
            break;
          default:
            renderDashboard(app);
        }
      }

      // --- VISTA: LOGIN ---
      function renderLogin(container) {
        container.innerHTML = `
                <div class="flex min-h-screen items-center justify-center p-4">
                    <div class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all duration-500 hover:scale-105">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold text-gray-900">Portal Escolar</h1>
                            <p class="text-gray-500 mt-2">Inicia sessió per accedir</p>
                        </div>
                        <form id="login-form" class="space-y-6">
                            <div class="relative">
                                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">${Icons.User}</div>
                                <input type="text" id="username" placeholder="Nom d'usuari" class="w-full rounded-md border-0 py-2.5 pl-10 pr-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-blue-600 sm:text-sm" required />
                            </div>
                            <div class="relative">
                                <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">${Icons.Lock}</div>
                                <input type="password" id="password" placeholder="Contrasenya" class="w-full rounded-md border-0 py-2.5 pl-10 pr-3 text-gray-900 ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-blue-600 sm:text-sm" required />
                            </div>
                            <p id="login-error" class="text-red-500 text-sm text-center hidden"></p>
                            <button type="submit" class="flex w-full justify-center rounded-md bg-blue-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 transition-all">Inicia Sessió</button>
                        </form>
                    </div>
                </div>
            `;

        document
          .getElementById("login-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("login-error");

            const { data: user, error } = await supabase
              .from("users")
              .select("*")
              .eq("username", username)
              .eq("password", password)
              .maybeSingle();

            if (user) {
              state.currentUser = user;
              state.view = "dashboard";
              if (user.role === "Professor") {
                const { data: students } = await supabase
                  .from("users")
                  .select("*")
                  .eq("role", "Alumne");
                state.students = students || [];
              }
              renderApp();
            } else {
              errorMsg.textContent = "Usuari o contrasenya incorrectes.";
              errorMsg.classList.remove("hidden");
            }
          });
      }

      // --- FETCH DATA FOR DASHBOARD ---
      async function fetchStudentGrades() {
        state.isLoadingData = true;
        renderApp(); // Renderitzar per mostrar spinner si cal

        // 1. Obtenir notes
        const { data: gradesData } = await supabase
          .from("grades")
          .select("*")
          .eq("student_username", state.currentUser.username);

        if (gradesData && gradesData.length > 0) {
          // 2. Obtenir exàmens
          const examIds = gradesData.map((g) => g.exam_id);
          const { data: examsData } = await supabase
            .from("exams")
            .select("*")
            .in("id", examIds);

          // 3. Combinar
          state.myGrades = gradesData.map((grade) => {
            const exam = examsData.find((e) => e.id === grade.exam_id);
            return {
              ...grade,
              exam: exam || {
                title: "Examen desconegut",
                subject: "General",
                date: "-",
              },
            };
          });
        } else {
          state.myGrades = [];
        }
        state.isLoadingData = false;
        renderApp();
      }

      async function fetchStudentHomework() {
        state.isLoadingData = true;
        renderApp();
        const { data: allHomework } = await supabase
          .from("homeworks")
          .select("*")
          .order("due_date", { ascending: true });
        if (allHomework) {
          state.myHomework = allHomework.filter(
            (hw) =>
              hw.assigned_students &&
              hw.assigned_students.includes(state.currentUser.username)
          );
        }
        state.isLoadingData = false;
        renderApp();
      }

      window.toggleHomeworkCompletion = async (homeworkId) => {
        const hwIndex = state.myHomework.findIndex((h) => h.id == homeworkId);
        if (hwIndex === -1) return;

        const hw = state.myHomework[hwIndex];
        const username = state.currentUser.username;
        let completedBy = hw.completed_by || [];

        if (completedBy.includes(username)) {
          completedBy = completedBy.filter((u) => u !== username);
        } else {
          completedBy.push(username);
        }

        // Update local state optimistic
        state.myHomework[hwIndex].completed_by = completedBy;
        renderApp(); // Re-render to show change immediately

        // Update DB
        await supabase
          .from("homeworks")
          .update({ completed_by: completedBy })
          .eq("id", homeworkId);
      };

      // --- VISTA: DASHBOARD ---
      function renderDashboard(container) {
        const user = state.currentUser;

        // Si estem carregant dades específiques (notes/deures), mostrar spinner dins del dashboard
        if (state.isLoadingData) {
          container.innerHTML = `<div class="flex h-full items-center justify-center"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>`;
          return;
        }

        const header = `
                <header class="bg-white shadow p-4 flex justify-between items-center mb-6">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">Portal Escolar</h1>
                        <p class="text-sm text-gray-500">Sessió iniciada com a <span class="font-semibold text-blue-700">${user.role}</span> (${user.username})</p>
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-chat" class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition">
                            ${Icons.Chat} Xat
                        </button>
                        <button id="btn-logout" class="flex items-center gap-2 px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition">
                            ${Icons.Logout} Sortir
                        </button>
                    </div>
                </header>
            `;

        let content = "";

        // LOGIC FOR RENDERING CONTENT BASED ON DASHBOARD VIEW
        if (state.dashboardView === "menu") {
          if (user.role === "Alumne") {
            content = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 max-w-4xl mx-auto">
                            <button onclick="window.navigateTo('grades')" class="bg-white p-6 rounded-2xl shadow-xl hover:scale-[1.02] transition-transform duration-300 group border border-gray-100 flex items-center gap-4 text-left">
                                <div class="bg-yellow-100 p-4 rounded-full group-hover:bg-yellow-200 transition-colors">
                                    <div class="text-yellow-700">${Icons.Academic}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800">Notes</h3>
                                    <p class="text-gray-500 text-sm">Consulta els resultats.</p>
                                </div>
                            </button>
                            <button onclick="window.navigateTo('homework')" class="bg-white p-6 rounded-2xl shadow-xl hover:scale-[1.02] transition-transform duration-300 group border border-gray-100 flex items-center gap-4 text-left">
                                <div class="bg-green-100 p-4 rounded-full group-hover:bg-green-200 transition-colors">
                                    <div class="text-green-700">${Icons.Book}</div>
                                </div>
                                <div>
                                    <h3 class="text-lg font-bold text-gray-800">Deures</h3>
                                    <p class="text-gray-500 text-sm">Tasques pendents.</p>
                                </div>
                            </button>
                        </div>
                    `;
          } else if (user.role === "Professor") {
            content = `
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 max-w-4xl mx-auto">
                            <div class="bg-white p-6 rounded-2xl shadow-lg border-l-4 border-indigo-500">
                                <h2 class="text-xl font-bold mb-2">Gestió d'Exàmens</h2>
                                <p class="text-gray-500">Funcionalitat simplificada en aquesta vista HTML.</p>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-lg border-l-4 border-yellow-500">
                                <h2 class="text-xl font-bold mb-2">Gestió de Deures</h2>
                                <p class="text-gray-500">Funcionalitat simplificada en aquesta vista HTML.</p>
                            </div>
                        </div>
                        <div class="mt-8 max-w-4xl mx-auto p-4">
                            <h3 class="text-lg font-bold mb-4">Llistat d'Alumnes</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                ${state.students
                                  .map(
                                    (s) => `
                                    <div class="bg-white p-3 rounded shadow text-sm">
                                        <p class="font-bold">${s.name}</p>
                                        <p class="text-gray-500">@${s.username}</p>
                                    </div>
                                `
                                  )
                                  .join("")}
                            </div>
                        </div>
                    `;
          }
        } else if (state.dashboardView === "grades" && user.role === "Alumne") {
          content = renderStudentGrades();
        } else if (
          state.dashboardView === "homework" &&
          user.role === "Alumne"
        ) {
          content = renderStudentHomework();
        }

        container.innerHTML = `
                <div class="animate-fade-in w-full h-full bg-gray-50 overflow-y-auto">
                    ${header}
                    ${content}
                </div>
            `;

        // Setup Listeners
        document.getElementById("btn-logout").onclick = () => {
          state.currentUser = null;
          state.view = "login";
          state.dashboardView = "menu";
          renderApp();
        };
        document.getElementById("btn-chat").onclick = () => {
          state.view = "chat";
          renderApp();
        };
      }

      // --- RENDER HELPERS: STUDENT GRADES ---
      function renderStudentGrades() {
        // Calculate Stats
        let statsHtml = "";
        if (state.myGrades.length > 0) {
          let totalScore = 0;
          const subjectStats = {};

          state.myGrades.forEach((g) => {
            totalScore += g.score;
            const sub = g.exam.subject || "General";
            if (!subjectStats[sub]) subjectStats[sub] = { total: 0, count: 0 };
            subjectStats[sub].total += g.score;
            subjectStats[sub].count++;
          });

          const generalAvg = (totalScore / state.myGrades.length).toFixed(1);

          // Color Helper
          const getColor = (s) =>
            s >= 9
              ? "text-green-600"
              : s >= 7
              ? "text-blue-600"
              : s >= 5
              ? "text-yellow-600"
              : "text-red-600";
          const getBg = (s) =>
            s >= 9
              ? "bg-green-100 border-green-200"
              : s >= 7
              ? "bg-blue-100 border-blue-200"
              : s >= 5
              ? "bg-yellow-100 border-yellow-200"
              : "bg-red-100 border-red-200";

          const subjectsHtml = Object.entries(subjectStats)
            .map(([name, data]) => {
              const avg = (data.total / data.count).toFixed(1);
              return `
                        <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex flex-col items-center">
                            <span class="text-xs text-gray-500 font-medium truncate w-full text-center">${name}</span>
                            <span class="text-xl font-bold ${getColor(
                              avg
                            )}">${avg}</span>
                        </div>
                    `;
            })
            .join("");

          statsHtml = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="p-6 rounded-xl border-2 flex flex-col items-center justify-center shadow-sm ${getBg(
                          generalAvg
                        )}">
                            <h3 class="text-gray-600 font-semibold mb-2 uppercase tracking-wide text-sm">Mitjana General</h3>
                            <div class="text-5xl font-extrabold ${getColor(
                              generalAvg
                            )}">${generalAvg}</div>
                        </div>
                        <div class="md:col-span-2 bg-gray-50 p-5 rounded-xl border border-gray-200">
                             <h3 class="text-gray-700 font-bold mb-4">Mitjana per Assignatures</h3>
                             <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">${subjectsHtml}</div>
                        </div>
                    </div>
                `;
        }

        const listHtml =
          state.myGrades.length === 0
            ? `<div class="text-center py-10 text-gray-500">No tens notes encara.</div>`
            : state.myGrades
                .map((g) => {
                  const colorClass =
                    g.score >= 5 ? "text-green-600" : "text-red-600";
                  return `
                        <div class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm mb-4 flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-bold uppercase">${
                                      g.exam.subject
                                    }</span>
                                    <span class="text-sm text-gray-500">${
                                      g.exam.date
                                    }</span>
                                </div>
                                <h3 class="text-lg font-bold text-gray-800">${
                                  g.exam.title
                                }</h3>
                                ${
                                  g.feedback
                                    ? `<div class="mt-2 text-sm text-gray-600 bg-gray-50 p-2 rounded">Feedback: ${g.feedback}</div>`
                                    : ""
                                }
                            </div>
                            <div class="text-3xl font-bold ${colorClass}">${
                    g.score
                  }</div>
                        </div>
                    `;
                })
                .join("");

        return `
                <div class="max-w-4xl mx-auto p-6 bg-white rounded-2xl shadow-lg mt-4">
                    <header class="flex items-center gap-4 mb-6 border-b pb-4">
                        <button onclick="window.navigateTo('menu')" class="text-gray-600 hover:text-gray-900 bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition">${Icons.Back}</button>
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">Les Meves Notes</h2>
                    </header>
                    ${statsHtml}
                    <div>${listHtml}</div>
                </div>
            `;
      }

      // --- RENDER HELPERS: STUDENT HOMEWORK ---
      function renderStudentHomework() {
        const listHtml =
          state.myHomework.length === 0
            ? `<div class="text-center py-10 text-gray-500">No tens deures pendents! 🎉</div>`
            : state.myHomework
                .map((hw) => {
                  const isCompleted =
                    hw.completed_by &&
                    hw.completed_by.includes(state.currentUser.username);
                  const dueDate = new Date(hw.due_date);
                  const today = new Date();
                  today.setHours(0, 0, 0, 0);
                  const isLate = dueDate < today;
                  const isSoon =
                    !isLate && dueDate - today < 2 * 24 * 60 * 60 * 1000; // 2 days

                  let statusBadge = "";
                  let cardClass = "bg-white border-gray-200";

                  if (isCompleted) {
                    statusBadge = `<span class="text-xs font-bold text-green-700 uppercase bg-green-100 px-2 py-0.5 rounded-full flex items-center gap-1">${Icons.Check} Fet</span>`;
                    cardClass = "bg-green-50 border-green-200";
                  } else if (isLate) {
                    statusBadge = `<span class="text-xs font-bold text-red-600 uppercase bg-red-100 px-2 py-0.5 rounded-full">Retard</span>`;
                    cardClass = "bg-red-50 border-red-200";
                  } else if (isSoon) {
                    statusBadge = `<span class="text-xs font-bold text-yellow-700 uppercase bg-yellow-100 px-2 py-0.5 rounded-full">Aviat</span>`;
                    cardClass = "bg-yellow-50 border-yellow-200";
                  }

                  return `
                        <div class="border rounded-xl p-5 shadow-sm transition-all flex flex-col sm:flex-row gap-4 mb-4 ${cardClass}">
                            <div class="flex-grow">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="bg-blue-100 text-blue-700 text-xs px-2 py-0.5 rounded-full font-bold uppercase">${
                                      hw.subject || "General"
                                    }</span>
                                    ${statusBadge}
                                </div>
                                <h3 class="text-lg font-bold text-gray-800 ${
                                  isCompleted
                                    ? "line-through text-gray-500"
                                    : ""
                                }">${hw.title}</h3>
                                <p class="text-gray-600 mt-2">${
                                  hw.description || ""
                                }</p>
                            </div>
                            <div class="flex flex-col justify-between items-end min-w-[140px] border-l pl-4 border-gray-100 gap-4">
                                <div>
                                    <span class="text-xs text-gray-500 uppercase font-semibold">Data d'entrega</span>
                                    <div class="flex items-center gap-1 text-lg font-bold ${
                                      !isCompleted && isLate
                                        ? "text-red-600"
                                        : "text-gray-800"
                                    }">
                                        ${Icons.Clock} ${hw.due_date}
                                    </div>
                                </div>
                                <button onclick="window.toggleHomeworkCompletion(${
                                  hw.id
                                })" 
                                    class="w-full py-2 px-3 rounded-lg font-semibold text-sm transition-colors flex items-center justify-center gap-2 
                                    ${
                                      isCompleted
                                        ? "bg-white border border-green-600 text-green-700 hover:bg-green-50"
                                        : "bg-green-600 text-white hover:bg-green-700 shadow-sm"
                                    }">
                                    ${isCompleted ? "Desmarcar" : `Marcar Fet`}
                                </button>
                            </div>
                        </div>
                    `;
                })
                .join("");

        return `
                <div class="max-w-4xl mx-auto p-6 bg-white rounded-2xl shadow-lg mt-4">
                    <header class="flex items-center gap-4 mb-6 border-b pb-4">
                        <button onclick="window.navigateTo('menu')" class="text-gray-600 hover:text-gray-900 bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition">${Icons.Back}</button>
                        <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">Els Meus Deures</h2>
                    </header>
                    <div>${listHtml}</div>
                </div>
            `;
      }

      // --- VISTA: XAT ---
      function renderChat(container) {
        const user = state.currentUser;
        const myConvs = state.conversations.filter((c) =>
          c.participants.includes(user.username)
        );
        const activeChat = state.currentChatId
          ? myConvs.find((c) => c.id === state.currentChatId)
          : null;

        const chatListHtml = myConvs
          .map((c) => {
            const isGroup = c.isGroup;
            const name = isGroup
              ? c.name
              : c.participants.find((p) => p !== user.username);
            const isActive =
              c.id === state.currentChatId
                ? "bg-blue-100"
                : "hover:bg-gray-100";

            return `
                    <div class="p-4 border-b cursor-pointer transition ${isActive}" onclick="window.selectChat('${c.id}')">
                        <h4 class="font-bold text-gray-800">${name}</h4>
                        <p class="text-xs text-gray-500 truncate">Feu clic per obrir</p>
                    </div>
                `;
          })
          .join("");

        let messagesHtml =
          '<div class="h-full flex items-center justify-center text-gray-500">Selecciona una conversa</div>';

        if (activeChat) {
          messagesHtml = activeChat.messages
            .map((msg) => {
              const isMe = msg.sender === user.username;
              const alignClass = isMe ? "message-sent" : "message-received";
              const senderName = isMe ? "Jo" : msg.sender;

              return `
                        <div class="flex flex-col mb-2 ${
                          isMe ? "items-end" : "items-start"
                        }">
                            <div class="message-bubble ${alignClass} bg-white">
                                ${
                                  !isMe && activeChat.isGroup
                                    ? `<p class="text-xs font-bold text-indigo-600 mb-1">${senderName}</p>`
                                    : ""
                                }
                                <p>${msg.text}</p>
                                <span class="text-[10px] text-gray-400 block text-right mt-1">${new Date(
                                  msg.timestamp
                                ).toLocaleTimeString([], {
                                  hour: "2-digit",
                                  minute: "2-digit",
                                })}</span>
                            </div>
                        </div>
                    `;
            })
            .join("");
        }

        container.innerHTML = `
                <div class="flex h-screen w-full bg-white overflow-hidden animate-fade-in">
                    <!-- Sidebar -->
                    <div class="w-1/3 border-r bg-gray-50 flex flex-col">
                        <div class="p-4 border-b bg-white flex justify-between items-center">
                            <button onclick="window.goBack()" class="text-gray-600 hover:text-gray-900 bg-gray-100 p-2 rounded-full hover:bg-gray-200 transition">${
                              Icons.Back
                            }</button>
                            <h2 class="font-bold">Xats</h2>
                            <button onclick="window.createChatPrompt()" class="text-blue-600 text-sm font-bold">+ Nou</button>
                        </div>
                        <div class="overflow-y-auto flex-grow">
                            ${
                              chatListHtml ||
                              '<p class="p-4 text-gray-400 text-sm text-center">No tens xats.</p>'
                            }
                        </div>
                    </div>

                    <!-- Main Chat -->
                    <div class="w-2/3 flex flex-col bg-gray-200" id="chat-messages-container">
                        <div id="messages-list" class="flex-grow p-4 overflow-y-auto custom-scrollbar flex flex-col">
                            ${messagesHtml}
                        </div>
                        ${
                          activeChat
                            ? `
                            <div class="p-3 bg-white border-t flex gap-2 items-center">
                                <input type="text" id="msg-input" placeholder="Escriu un missatge..." class="flex-grow border rounded-full px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                                <button id="send-btn" class="p-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition">
                                    ${Icons.Send}
                                </button>
                            </div>
                        `
                            : ""
                        }
                    </div>
                </div>
            `;

        const msgList = document.getElementById("messages-list");
        if (msgList) msgList.scrollTop = msgList.scrollHeight;

        const sendBtn = document.getElementById("send-btn");
        const msgInput = document.getElementById("msg-input");

        if (sendBtn && msgInput) {
          const sendMessage = async () => {
            const text = msgInput.value.trim();
            if (!text) return;

            const newMessage = {
              id: Date.now().toString(),
              text: text,
              sender: user.username,
              timestamp: new Date().toISOString(),
            };

            const chatIndex = state.conversations.findIndex(
              (c) => c.id === state.currentChatId
            );
            if (chatIndex > -1) {
              state.conversations[chatIndex].messages.push(newMessage);
              msgInput.value = "";
              renderChat(container);
              await supabase
                .from("conversations")
                .upsert(state.conversations[chatIndex]);
            }
          };

          sendBtn.addEventListener("click", sendMessage);
          msgInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
          });
        }
      }

      // --- FUNCIONS GLOBALS ---
      window.selectChat = (id) => {
        state.currentChatId = id;
        renderApp();
      };

      window.goBack = () => {
        state.view = "dashboard";
        state.dashboardView = "menu";
        renderApp();
      };

      window.navigateTo = (viewName) => {
        state.dashboardView = viewName;
        if (viewName === "grades") fetchStudentGrades();
        else if (viewName === "homework") fetchStudentHomework();
        else renderApp();
      };

      window.createChatPrompt = async () => {
        const username = prompt(
          "Introdueix el nom d'usuari amb qui vols parlar:"
        );
        if (!username) return;

        const exists = state.users.find((u) => u.username === username);
        if (!exists) {
          alert("Usuari no trobat.");
          return;
        }

        const newConv = {
          id: `conv-${Date.now()}`,
          participants: [state.currentUser.username, username],
          messages: [],
          isGroup: false,
        };

        state.conversations.push(newConv);
        state.currentChatId = newConv.id;
        await supabase.from("conversations").insert([newConv]);
        renderApp();
      };

      initApp();
    </script>
  </body>
</html>
