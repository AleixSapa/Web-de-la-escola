<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Escolar</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Import Map per a llibreries externes (Supabase, Chess.js, Gemini) -->
    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2",
          "chess.js": "https://esm.sh/chess.js@1.0.0-beta.8",
          "@google/genai": "https://esm.sh/@google/genai@^1.10.0"
        }
      }
    </script>
  </head>
  <body
    class="bg-gradient-to-br from-blue-100 via-blue-50 to-indigo-100 min-h-screen text-gray-800 font-sans"
  >
    <!-- Loader -->
    <div
      id="loader"
      class="fixed inset-0 flex items-center justify-center bg-white z-50"
    >
      <div class="flex flex-col items-center">
        <div
          class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"
        ></div>
        <p class="text-gray-600 font-medium">Carregant...</p>
      </div>
    </div>

    <!-- Main Container -->
    <main class="container mx-auto p-4 max-w-6xl">
      <!-- VISTA: LOGIN -->
      <div
        id="view-login"
        class="view-section hidden h-screen flex items-center justify-center"
      >
        <div
          class="bg-white p-8 md:p-10 rounded-2xl shadow-2xl w-full max-w-md transform transition-all duration-500 hover:scale-105"
        >
          <div class="text-center mb-8">
            <div class="inline-block bg-blue-100 p-3 rounded-full mb-4">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-8 w-8 text-blue-600"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 14l9-5-9-5-9 5 9 5z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"
                />
              </svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Portal Escolar</h1>
            <p class="text-gray-500 mt-2">Inicia sessió per accedir</p>
          </div>
          <form id="login-form" class="space-y-6">
            <div>
              <input
                type="text"
                id="username"
                placeholder="Nom d'usuari"
                class="w-full rounded-md border py-2.5 px-3 text-gray-900 ring-1 ring-gray-300 focus:ring-2 focus:ring-blue-600"
                required
              />
            </div>
            <div>
              <input
                type="password"
                id="password"
                placeholder="Contrasenya"
                class="w-full rounded-md border py-2.5 px-3 text-gray-900 ring-1 ring-gray-300 focus:ring-2 focus:ring-blue-600"
                required
              />
            </div>
            <div
              id="login-message"
              class="hidden p-4 rounded-md text-sm text-center"
            ></div>
            <button
              type="submit"
              class="flex w-full justify-center rounded-md bg-blue-600 px-3 py-2.5 text-sm font-semibold text-white hover:bg-blue-500 shadow-sm transition-all"
            >
              Inicia Sessió
            </button>
          </form>
        </div>
      </div>

      <!-- VISTA: DASHBOARD -->
      <div id="view-dashboard" class="view-section hidden animate-fade-in">
        <header
          class="flex flex-col sm:flex-row items-center justify-between mb-8 gap-4 bg-white p-4 rounded-xl shadow-sm"
        >
          <div>
            <h1 class="text-3xl font-bold text-gray-900">Portal Escolar</h1>
            <p class="text-gray-600">
              Benvingut,
              <span
                id="user-display-name"
                class="font-semibold text-blue-700"
              ></span>
              (<span id="user-role-display"></span>)
            </p>
          </div>
          <div class="flex items-center gap-2">
            <button
              onclick="app.navigateTo('chat')"
              class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-green-600 rounded-md hover:bg-green-700 shadow-sm"
            >
              <span>Xat</span>
            </button>
            <button
              onclick="app.logout()"
              class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 shadow-sm"
            >
              <span>Sortir</span>
            </button>
          </div>
        </header>

        <div
          id="dashboard-content"
          class="grid grid-cols-1 md:grid-cols-2 gap-6"
        >
          <!-- El contingut es genera dinàmicament via JS -->
        </div>
      </div>

      <!-- VISTA: CHAT -->
      <div
        id="view-chat"
        class="view-section hidden h-[calc(100vh-2rem)] flex flex-col"
      >
        <div
          class="bg-white rounded-2xl shadow-lg flex-grow flex flex-col overflow-hidden"
        >
          <header
            class="flex items-center justify-between p-4 border-b bg-gray-50"
          >
            <button
              onclick="app.navigateTo('dashboard')"
              class="text-gray-600 hover:text-gray-900 font-semibold flex items-center gap-2"
            >
              ← Tornar
            </button>
            <h1 class="text-xl font-bold text-gray-800">Xat Escolar</h1>
            <div class="w-16"></div>
            <!-- Spacer -->
          </header>
          <div class="flex flex-grow overflow-hidden">
            <aside
              class="w-1/3 border-r overflow-y-auto bg-gray-50"
              id="chat-list"
            >
              <!-- Llista de converses -->
            </aside>
            <main class="w-2/3 flex flex-col bg-gray-50 relative">
              <div
                id="chat-messages"
                class="flex-grow p-4 overflow-y-auto space-y-4"
              >
                <p class="text-center text-gray-500 mt-10">
                  Selecciona una conversa.
                </p>
              </div>
              <div class="p-4 border-t bg-white">
                <form id="chat-form" class="flex items-center gap-2">
                  <input
                    type="text"
                    id="message-input"
                    placeholder="Escriu un missatge..."
                    class="w-full rounded-md border border-gray-300 p-2 focus:ring-2 focus:ring-blue-500"
                  />
                  <button
                    type="submit"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
                  >
                    Enviar
                  </button>
                </form>
              </div>
            </main>
          </div>
        </div>
      </div>

      <!-- VISTA: CHESS -->
      <div id="view-chess" class="view-section hidden">
        <header class="flex items-center justify-between mb-4">
          <button
            onclick="app.navigateTo('dashboard')"
            class="text-gray-600 hover:text-gray-900 font-semibold flex items-center gap-2"
          >
            ← Tornar
          </button>
          <h1 class="text-xl font-bold">Escacs vs IA</h1>
          <button
            onclick="app.resetChessGame()"
            class="px-4 py-2 bg-blue-600 text-white rounded-md"
          >
            Partida Nova
          </button>
        </header>
        <div class="flex flex-col md:flex-row gap-6 justify-center">
          <div
            id="chessboard"
            class="grid grid-cols-8 w-full max-w-md aspect-square border-4 border-gray-700 shadow-2xl rounded-lg overflow-hidden select-none"
          >
            <!-- Tauler generat per JS -->
          </div>
          <div class="bg-white p-6 rounded-lg shadow-lg w-full md:w-64 h-fit">
            <h2 class="text-lg font-bold mb-4">Estat</h2>
            <p id="chess-status">Torn de: Blanques</p>
            <p
              id="ai-thinking"
              class="hidden text-blue-600 animate-pulse mt-2 font-bold"
            >
              La IA està pensant...
            </p>
          </div>
        </div>
      </div>
    </main>

    <!-- JavaScript Logic -->
    <script type="module" src="script.js"></script>
  </body>
</html>
